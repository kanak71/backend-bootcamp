  <!-- div 영역요소(특징을 가지지 않고 영역을 나눌 때, 선택을 쉽게 하기 위해서 사용하는 태그 : tbody, tfoot, section, aside)-->
  <div>
      <!--블럭요소 (하나의 태그가 한줄의 영역을 가지고 있다)-->
      <h1>
        <!--인라인요소(콘텐츠의 크기 만큼만 영역을 가짐 : <span> <q> <a>)-->
        <!--#은 내 document의 id를 지칭하게 된다 : 내 페이지에서 특정 영역을 이동-->
        <!--title은 속성 값 : 풍선도움말, screen Reader에서 title을 읽어서 화면을 설명-->
        <a href="https://www.naver.com" target="_blank" title="네이버링크">
          다른 사이트로 이동
        </a>
      </h1>

      <h1>봄이 오고 있어요</h1>
      <div>
          <strong>내일은 봄비가 내릴까요?</strong> 내일은 3월 28일 입니다
      </div>

      <!--인라인 요소는(자신의 콘텐츠 값만을 영역으로 크기를 가짐, 다른 영역의 요소로 사용이 가능하다, 자식 태그로 작성이 가능)-->
      <p>
        <blockquote>꽃이 피는 봄</blockquote>
      </p>

      <h2>2026년 3월 27일</h2>
      <img alt="꽃" src="https://data1.pokemonkorea.co.kr/newdata/pokedex/mid/004301.png">
      <h2 onclick="javascript:alert('금요일이다')">
        <time>2026년 3월 27일</time>
      </h2>

      <!--
        리스트 태그
        UL(리스트), OL(순서매겨줌) 목록의 상위
        LI 리스트 하위 목록
      -->
      <ul>
        <li>html</li>
        <li>java</li>
        <li>db</li>
        <li>js</li>
      </ul>
