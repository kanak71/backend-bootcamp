<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 적용 방법-선택자</title>
    <style type="text/css">
        /*
            ** CSS의 <style>은 반드시 <head> 내에서만 작성이 가능하다
            1. 작성방법 : inline, embeded, linked
            2. 선택 : id(100) > class(10) > tag(1) 순으로 우선순위가 높다(중복되어 적용되어 있다면 우선순위에 따라서 적용된다)
                    ex) <div id = "a" class ="b"></div>
                        id와 class => 110 적용이 되어 우선순위 110으로 처리된다
            3. 적용의 우선순위
                inline 0
                작성된 순서에 따라서 오버라이드 되어 적용된다
            4. node tree되어 있기 때문에 상위 tag의 css가 하위 tag에 영향을 준다
        */

        body{
            border: 1px solid green; /*단순 작업 방식으로 사용한다*/
            border-bottom-color: orange;
            border-radius: 10px;
            background-color: azure;

            /*
                margin : element가 다른 element를 밀어 내는 크기
                padding : 콘텐츠가 감싸고 있는  tag 내부를 밀어냄(내부 공간의 크기)

            */

            margin: 100px 0px; /* 위 오른쪽 아래 왼쪽*/
            margin-left: 30px;

            color: blue; /* 글자의 색*/

            padding-left: 20px;

            font-family: fantasy;
        }

        p{
            background-color: bisque;
            margin-left: 50px;
        }

        font{
            background-color: brown;
            padding :50px;
        }

        /* HTML에 작성하는 법 Embeding*/

    </style>
</head>
<body>
    <!--상위에서 폰트 크기를 20px로 설정-->
    <div style="font-size: 20px;">
        <p style ="background-color: white;">나는 기본 margin을 가진 P tag 이다</p>
        <font>Have a Nice Day ~!!</font>
    </div>
    
</body>
</html>
