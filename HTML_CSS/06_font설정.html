<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>외부폰트를 사용하는 방법</title>
    <link rel="stylesheet" href="./css/06_font.css">
</head>
<body>
    <!--margin : 위 오른쪽 아래 왼쪽: 50px auot 젤로 - 위 아래는 영역이 있다 auto로 가운데 정렬-->
    <div style="width: 900px; margin: 50px auto;">
        <h3>fragile and still here</h3>
        <p> <!--body div p-->
        자신이 누구보다 빛날 수 있다 생각했던 작은 별<br>
        그 별은 오늘도<br>
        밤하늘의 어둠 속에서 홀로 빛을 낸다<br>
        </p>

        <p>
        사랑하는 이들을 위해<br>
        I’m a fading boy, 흐트러진<br>
        감정 속 날 지워<br>
        이름 없는 매일과<br>
        돌고 도는 먼지 속에<br>
        </p>
    </div>
    
</body>
</html>
