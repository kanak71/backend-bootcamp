<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테이블 만들기</title>
</head>
<body>
    <h1>테이블 만들기</h1>
    <!--외부에 있는 css파일을 연결하여 사용한다 Linked 방식-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" type="text/css" href="./css/04_table.css">

    <h2>테이블 병합하기</h2>
    <!-- 병합 colspan rowspan-->
    <table>
        <tr>
            <td colspan="2">apple</td>
            <!-- <td>lemon</td> -->
            <td rowspan="2">tomato</td>
        </tr>

        <tr>
            <td>water</td>
            <td>ice</td>
            <!-- <td>steam</td> -->

        </tr>

    </table>

    <!-- 
        Table의 표준 작성 방법 
        브라우저는 아무리 이상하게 코드를 작성해도 알아서 표현해 준다
     
    -->
        <!-- class="container"는 Bootstrap의 기본 최상위 css Margin : auto 가운데 정렬-->
    <div class="container">
        <table style="border: 3px solid maroon; width: 50%;">
            <caption>HTML TABLE 수업</caption>
            <thead>
                <tr>
                    <td>연변</td>
                    <td>과목</td>
                    <td>난이도</td>
                </tr>
                <tbody>
                    <tr>
                        <td>2</td>
                        <td>sql</td>
                        <td>***</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>html</td>
                        <td>*</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="2">소계</td>
                        <td>***</td>
                    </tr>
                </tfoot>
            </thead>
        </table>
    </div>

    <hr>
    <!--BootStrap의 class를 사용하여 TABLE의 모양을 구성해 보자-->
    <div class="container">
        <table class="table table-primary table-striped" >
            <thead>
                <tr class="warning">
                    <th>과일</th>
                    <th>여름</th>
                    <th>겨울</th>
                </tr>

            </thead>
            <tbody>
                <tr>
                    <td>사과</td>
                    <td>바나나</td>
                    <td>토마토</td>
                </tr>
                <tr>
                    <td>sky</td>
                    <td>cloud</td>
                    <td>wind</td>
                </tr>

            </tbody>

        </table>


    </div>    


</body>
</html>
