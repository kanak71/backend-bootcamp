<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트 인트로</title>
</head>
<script type="text/javascript" src="./js/js_001.js"></script>

<script>
    function embeded() {
        /*범위주석*/ 
        //단줄주석
        //*함수는 기능을 정의하는 곳 function
        //  명시적 함수, 익명적 함수, 화살표 함수
        console.log('임베드 실행');
        alert('임베드 실행');
}

    //** 자바스크립트는 실행을 시킬 때 오버라이드 되어서 실행된다
    function linked(){
        alert("링크를 오버라이드 했다");
    }

</script>
    

<body>
    <ul>
        <li onclick="javascript:alert('인라인 실행')">1. 인라인방식 : tag내에 속성으로 작성 on***</li>
        <li onclick="embeded()">2. 임베드방식 : document(문서) 내에 &lt;script&gt; 작성</li>
        <li onclick="linked()">3. 링크드방식 : js파일을 외부에서 작성 후 &lt;script&gt; src 속성으로 연결</li>
    </ul>
    <div>
        <fieldset>
            <legend>javascript DOM 탐색</legend>
            <div>
                문제 : li태그 중에서 두번째에 있는 항목에 대해서 <br>
                글자 red, 두께 bold, 속성중에 title 추가, 콘텐츠의 내용을 출력
            </div>
            <button onclick="searchDom()">DOM 적용</button>
        </fieldset>

        <script type="text/javascript">
            /*
                document(페이지)에서 의도하여 화면이 모두 렌더링 된 후에 실행 될 수 있도록 하기 위해서

            */
           function searchDom(){
                console.log("화면의 BUTTON 탐색");
                var obj = document.getElementsByTagName("li");    //화면에 있는 <li>를 모두 검색한 객체
                console.log(obj, obj.length, obj[1]);   //***
                //alert(obj) 객체는 alert로 출력하지 마세요***
                console.log('콘텐츠는 tag 안의 값 : ', obj[1].innerHTML);

                //dom탐색을 통해서 해당 객체의 style을 변경해보자
                //글자 red, 두께 bold, 속성중에 title 추가, 콘텐츠의 내용을 출력
                //<li style="color:red; font-weight:bold"><li>
                obj[1].style.color="red";
                obj[1].style.fontWeight="bold";
                obj[1].title="변경합니다";
           }

        </script>


    </div>
</body>
</html>
