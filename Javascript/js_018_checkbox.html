<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckBox의 사용</title>
    <link rel="stylesheet" href="./css/js_018.css">
    <script type="text/javascript" src="./js/js_018.js"></script>
</head>
<body>

    <div id="colorBox">
        <div id="red">빨강</div>
        <div id="blue">파랑</div>
        <div id="yellow">노랑</div>
        <div id="green">녹색</div>
    </div>

    <div id="base">
        <input type="checkbox" name="allCheck" onclick="allSelect(this.checked)"><br>
        <input type="checkbox" name="chk" value="red">빨강<br>
        <input type="checkbox" name="chk" value="blue">파랑<br>
        <input type="checkbox" name="chk" value="yellow">노랑<br>
        <input type="checkbox" name="chk" value="green">녹색<br>

        <input type="button" value="선택" onclick="selColor()">
        <input type="button" value="초기화" onclick="clearDiv()">
    </div>
    
</body>
</html>
