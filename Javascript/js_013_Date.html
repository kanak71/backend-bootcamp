<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날짜 객체</title>
    <script type="text/javascript" src="./js/js_013.js"></script>
</head>
<body>
    <ol>
        <li>
            <b>오늘 날짜</b><br>
            <span id="nowDay"></span>
            <button>오늘 날짜</button>
        </li>


        <li>
            <b>특정날짜</b>
            <span id="specifyDay"></span>
            <input type="date" id="inputDate">
            <button>특정날짜</button>
        </li>

        <li>
            <b>경과날짜</b>
            <label for="dates">지정날짜</label>
            <input type="date" id="dates" size="30" value="2026-03-31">
            <br>

            <label for="inputD">경과일</label>
            <input type="number" id="inputD">
            <br>

            <label for="resultDate">경과 후 날짜</label>
            <input type="text" id="resultDate">
            <button>경과날짜 출력</button>
        </li>

        <li>
            <b>D-day</b>
            <label for="inputDate2">지정날짜</label>
            <input type="date" id="inputDate2" size="30">
            <br>

            <label for="inputDate1">수료날짜</label>
            <input type="date" id="inputDate1">
            <br>

            <input type="text" id="result1" readonly>
            <br>
            <button>D-Day 계산결과</button>
        </li>

    </ol>
</body>
</html>
