<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM의 속성탐색</title>
    <script type="text/javascript" src="./js/js_023.js"></script>
</head>
<body>
    <ul>
        <li>엘리먼트생성 : createElement("태그명")</li>
        <li>속성객체 : createAttribute("속성명")</li>
        <li>콘텐츠 추가 : createTextNode("내용")</li>
        <li>속성추가 : setAttribute("속성명") , setAttribute("속성명", "속성값")</li>
    </ul>

    <button onclick="elementCreate()">Element 동적생성</button>
    <p id="loc"></p>
</body>
</html>
